quarkus.http.port=7181

# JWT
auth.jwt.secret=change-me-in-production-must-be-at-least-32-chars
auth.base-url=http://localhost:7181

# SMTP (override via env vars in prod)
quarkus.mailer.host=smtp.example.com
quarkus.mailer.port=587
quarkus.mailer.username=noreply@example.com
quarkus.mailer.password=secret
quarkus.mailer.from=noreply@mygame.com
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.mock=true

# Storage paths
auth.users-file=data/users.txt
auth.credentials-file=data/credentials.txt

# OAuth clients (comma-separated client_id:redirect_uri pairs)
auth.clients=game-client:http://localhost:7181/demo.html,backgammon:http://localhost:8080/,backgammon:http://localhost:8080/signin

# Game server (used for passkey recovery — validates email ownership)
# Omit auth.game-server.url to disable the recovery feature entirely
#auth.game-server.url=http://localhost:3000
#auth.game-server.secret=change-me-game-server-secret

# Introspect secret (shared with game server)
auth.introspect-secret=change-me-introspect-secret

# WebAuthn Relying Party
auth.rp.id=localhost
auth.rp.name=MyGame
auth.rp.origin=http://localhost:7181,http://localhost:8080

# CORS — allow any origin to fetch auth fragments and CSS
quarkus.http.cors=true
quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=Content-Type,X-Introspect-Secret
quarkus.http.cors.exposed-headers=Location
