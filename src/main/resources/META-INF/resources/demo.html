<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game App — Passkey Demo</title>

    <link rel="stylesheet" href="/auth.css">

    <style>
        body {
            background: #1a1a2e;
            color: #eee;
            font-family: system-ui, sans-serif;
            margin: 0;
            display: block;
            min-height: 100vh;
        }

        header {
            background: #16213e;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            border-bottom: 1px solid #0f3460;
        }

        header h1 { font-size: 1.25rem; color: #e94560; margin: 0; }

        nav { margin-left: auto; display: flex; gap: 0.75rem; }
        nav button {
            background: transparent;
            border: 1px solid #e94560;
            color: #e94560;
            padding: 0.375rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.875rem;
        }
        nav button.active, nav button:hover {
            background: #e94560;
            color: #fff;
        }

        .game-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 57px);
            padding: 2rem;
        }

        #auth-container { min-width: 340px; }

        #loggedin-panel {
            display: none;
            text-align: center;
        }
        #loggedin-panel h2 { color: #e94560; margin-bottom: 0.5rem; }
        #loggedin-panel p  { color: #aaa; font-size: 0.9rem; margin-bottom: 1.5rem; }
        #loggedin-panel button {
            background: transparent;
            border: 1px solid #e94560;
            color: #e94560;
            padding: 0.5rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Game theme overrides for auth card */
        .auth-card { background: #16213e; box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
        .auth-card h1 { color: #e94560; }
        .auth-card label { color: #ccc; }
        .auth-card input[type="text"],
        .auth-card input[type="email"] {
            background: #0f3460; border-color: #0f3460; color: #eee;
        }
        .auth-card input:focus {
            border-color: #e94560;
            box-shadow: 0 0 0 2px rgba(233,69,96,0.25);
        }
        .auth-card button[type="button"] {
            width: 100%;
            padding: 0.625rem;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            margin-top: 0.5rem;
        }
        .auth-card button[type="button"]:hover { background: #c73652; }
        .auth-card button[type="button"]:disabled { background: #555; cursor: not-allowed; }
        .auth-card .auth-links a { color: #e94560; }
        .auth-card .auth-hint { color: #777; }
    </style>
</head>
<body>

<header>
    <h1>&#9876; MyGame</h1>
    <nav id="auth-nav">
        <button id="btn-login" class="active" onclick="showPanel('login')">Sign In</button>
        <button id="btn-signup" onclick="showPanel('signup')">Create Account</button>
    </nav>
</header>

<div class="game-screen">
    <div id="auth-container"></div>

    <div id="loggedin-panel">
        <h2>You're in!</h2>
        <p>Passkey verified. Token stored in localStorage.<br>Open the console — you should see "logged in".</p>
        <button onclick="handleLogout()">Sign Out</button>
    </div>
</div>

<script src="/auth-client.js"></script>

<script>
    const auth = new AuthClient('http://localhost:7181', {
        clientId:    'game-client',
        redirectUri: 'http://localhost:7181/demo.html',

        onLogin: (token) => {
            console.log('logged in', token);
            showLoggedIn();
        },

        onSignup: () => {
            // Success message is already shown inline by auth-client.js
        },
    });

    function showPanel(panel) {
        document.getElementById('btn-login').classList.toggle('active', panel === 'login');
        document.getElementById('btn-signup').classList.toggle('active', panel === 'signup');

        if (panel === 'signup') {
            auth.showSignup(document.getElementById('auth-container'));
        } else {
            auth.showLogin(document.getElementById('auth-container'));
        }
    }

    function showLoggedIn() {
        document.getElementById('auth-container').style.display = 'none';
        document.getElementById('auth-nav').style.display = 'none';
        document.getElementById('loggedin-panel').style.display = 'block';
    }

    function handleLogout() {
        auth.logout();
        document.getElementById('auth-container').style.display = '';
        document.getElementById('auth-nav').style.display = '';
        document.getElementById('loggedin-panel').style.display = 'none';
        showPanel('login');
    }

    if (auth.getToken()) {
        showLoggedIn();
    } else {
        showPanel('login');
    }
</script>

</body>
</html>
